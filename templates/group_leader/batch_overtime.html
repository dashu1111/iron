{% extends "base.html" %}
{% block content %}
<h2>批量加班填报</h2>
<form method="post" class="row g-3" id="batchOvertimeForm">
    <div class="col-md-4">
        <label class="form-label">加班日期</label>
        <input type="date" name="date" class="form-control" required value="{{ default_date }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">班次</label>
        <select name="shift" class="form-select" id="shiftSelect">
            <option value="白班">白班</option>
            <option value="夜班">夜班</option>
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">加班类型</label>
        <select name="ot_type" class="form-select" id="otTypeSelect">
            <option value="在线内包">在线内包</option>
            <option value="在线外包">在线外包</option>
            <option value="行车">行车</option>
            <option value="离线">离线</option>
            <option value="支撑检修">支撑检修</option>
        </select>
    </div>

    <!-- 统一默认值（可被逐行覆盖） -->
    <div class="col-md-4">
        <label class="form-label">默认开始时间</label>
        <input type="time" name="default_start_time" class="form-control" value="18:00">
    </div>
    <div class="col-md-4">
        <label class="form-label">默认结束时间</label>
        <input type="time" name="default_end_time" class="form-control" value="21:00">
    </div>
    <div class="col-md-4" id="defaultQuantityDiv" style="display:none;">
        <label class="form-label">默认产量（包）</label>
        <input type="number" step="0.01" name="default_quantity" class="form-control" value="0">
    </div>
    <div class="col-md-4" id="defaultManualAmountDiv" style="display:none;">
        <label class="form-label">默认金额（元）</label>
        <input type="number" step="0.01" name="default_manual_amount" class="form-control" value="0">
    </div>
    <div class="col-md-8">
        <label class="form-label">统一加班事由</label>
        <input type="text" name="default_reason" class="form-control">
    </div>

    <div class="col-12"><hr><h5>选择加班员工（同作业区所有班组）</h5></div>
    <div class="col-12">
        <button type="button" class="btn btn-sm btn-secondary mb-2" id="btnSelectAll">全选</button>
        <button type="button" class="btn btn-sm btn-secondary mb-2" id="btnUncheckAll">取消全选</button>
        <div class="table-responsive">
            <table class="table table-sm table-bordered" id="workerTable">
                <thead>
                    <tr>
                        <th>选择</th><th>班组</th><th>姓名</th>
                        <th>开始时间</th><th>结束时间</th>
                        <th class="quantity-col" style="display:none;">产量(包)</th>
                        <th class="manual-amount-col" style="display:none;">金额(元)</th>
                        <th>事由</th>
                        <th>预计加班费</th>
                    </tr>
                </thead>
                <tbody>
                {% for w in workers %}
                <tr>
                    <td><input type="checkbox" name="selected_workers" value="{{ w.id }}"></td>
                    <td>{{ w.group }}</td>
                    <td>{{ w.name }}</td>
                    <td><input type="time" name="start_time_{{ w.id }}" class="form-control form-control-sm start-time" value="18:00"></td>
                    <td><input type="time" name="end_time_{{ w.id }}" class="form-control form-control-sm end-time" value="21:00"></td>
                    <td class="quantity-col" style="display:none;"><input type="number" step="0.01" name="quantity_{{ w.id }}" class="form-control form-control-sm quantity-input" value="0"></td>
                    <td class="manual-amount-col" style="display:none;"><input type="number" step="0.01" name="manual_amount_{{ w.id }}" class="form-control form-control-sm manual-amount-input" value="0"></td>
                    <td><input type="text" name="reason_{{ w.id }}" class="form-control form-control-sm"></td>
                    <td class="estimated-amount">0</td>
                </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-success">提交加班申请</button>
    </div>
</form>

<script>
// 动态显示产量/金额列，并实时计算预估加班费
const otTypeSelect = document.getElementById('otTypeSelect');
const shiftSelect = document.getElementById('shiftSelect');
const defaultQuantityDiv = document.getElementById('defaultQuantityDiv');
const defaultManualAmountDiv = document.getElementById('defaultManualAmountDiv');
const quantityCols = document.querySelectorAll('.quantity-col');
const manualAmountCols = document.querySelectorAll('.manual-amount-col');
const quantityInputs = document.querySelectorAll('.quantity-input');
const manualAmountInputs = document.querySelectorAll('.manual-amount-input');
const defaultStart = document.querySelector('input[name="default_start_time"]');
const defaultEnd = document.querySelector('input[name="default_end_time"]');
const startTimeInputs = document.querySelectorAll('.start-time');
const endTimeInputs = document.querySelectorAll('.end-time');
const estimatedAmountCells = document.querySelectorAll('.estimated-amount');

function updateForm() {
    const type = otTypeSelect.value;
    // 显示/隐藏列
    const showQuantity = (type === '离线');
    const showManual = (type === '支撑检修');
    quantityCols.forEach(el => el.style.display = showQuantity ? '' : 'none');
    manualAmountCols.forEach(el => el.style.display = showManual ? '' : 'none');
    defaultQuantityDiv.style.display = showQuantity ? '' : 'none';
    defaultManualAmountDiv.style.display = showManual ? '' : 'none';

    // 重新计算所有行的加班费
    calculateAll();
}

function setDefaultTimeByShift(shift) {
    if (shift === '白班') {
        defaultStart.value = '08:00';
        defaultEnd.value = '20:00';
    } else if (shift === '夜班') {
        defaultStart.value = '20:00';
        defaultEnd.value = '08:00';
    }
    // 同步所有员工行的时间为统一默认值
    startTimeInputs.forEach(input => input.value = defaultStart.value);
    endTimeInputs.forEach(input => input.value = defaultEnd.value);
}

// 页面加载时初始化
setDefaultTimeByShift(shiftSelect.value);

// 切换班次时自动更新
shiftSelect.addEventListener('change', function() {
    setDefaultTimeByShift(this.value);
    // 重新计算加班费（因为时间变化可能影响时长，但此处你的计算逻辑不依赖时长，可忽略或保留原有计算）
});

function calculateAll() {
    const type = otTypeSelect.value;
    const shift = shiftSelect.value;
    quantityInputs.forEach((input, index) => {
        const qty = parseFloat(input.value) || 0;
        const manual = parseFloat(manualAmountInputs[index].value) || 0;
        let amount = 0;
        if (type === '支撑检修') {
            amount = manual;
        } else {
            // 使用计算函数（前端简化版，确保与后端一致）
            switch(type) {
                case '在线内包': amount = (shift==='白班') ? 320 : 350; break;
                case '在线外包': amount = (shift==='白班') ? 370 : 400; break;
                case '行车': amount = (shift==='白班') ? 300 : 350; break;
                case '离线': amount = 300 + qty * 12; break;
            }
        }
        estimatedAmountCells[index].textContent = amount.toFixed(2);
    });
}

// 监听类型和班次变化
otTypeSelect.addEventListener('change', updateForm);
shiftSelect.addEventListener('change', calculateAll);

// 监听所有产量、金额输入变化
quantityInputs.forEach(input => input.addEventListener('input', calculateAll));
manualAmountInputs.forEach(input => input.addEventListener('input', calculateAll));

// 初始化
updateForm();

const batchForm = document.getElementById('batchOvertimeForm');
const btnSelectAll = document.getElementById('btnSelectAll');
const btnUncheckAll = document.getElementById('btnUncheckAll');
const workerCheckboxes = document.querySelectorAll('input[name="selected_workers"]');

function setSelectButton(active) {
    btnSelectAll.classList.toggle('btn-primary', active === 'all');
    btnSelectAll.classList.toggle('btn-secondary', active !== 'all');
    btnUncheckAll.classList.toggle('btn-primary', active === 'none');
    btnUncheckAll.classList.toggle('btn-secondary', active !== 'none');
}

function checkAll() {
    workerCheckboxes.forEach(function (cb) { cb.checked = true; });
    setSelectButton('all');
}

function uncheckAll() {
    workerCheckboxes.forEach(function (cb) { cb.checked = false; });
    setSelectButton('none');
}

function updateSelectButtons() {
    var checked = Array.from(workerCheckboxes).filter(function (cb) { return cb.checked; }).length;
    var total = workerCheckboxes.length;
    if (checked === total && total > 0) setSelectButton('all');
    else if (checked === 0) setSelectButton('none');
    else setSelectButton(null);
}

btnSelectAll.addEventListener('click', checkAll);
btnUncheckAll.addEventListener('click', uncheckAll);
workerCheckboxes.forEach(function (cb) {
    cb.addEventListener('change', updateSelectButtons);
});

batchForm.addEventListener('submit', function (e) {
    if (document.querySelectorAll('input[name="selected_workers"]:checked').length === 0) {
        e.preventDefault();
        alert('未选中人员');
    }
});
</script>
{% endblock %}
