{% extends "base.html" %}
{% block content %}
<h2>代报加班</h2>
<form method="post" class="row g-3">
    <div class="col-md-4">
        <label class="form-label">员工</label>
        <select name="user_id" class="form-select">
            {% for w in workers %}
            <option value="{{ w.id }}">{{ w.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">加班日期</label>
        <input type="date" name="date" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">班次</label>
        <select name="shift" class="form-select">
            <option>白班</option><option>夜班</option>
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">加班类型</label>
        <select name="ot_type" class="form-select">
            <option>工作日延时</option><option>休息日加班</option><option>节假日加班</option>
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">开始时间</label>
        <input type="time" name="start_time" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">结束时间</label>
        <input type="time" name="end_time" class="form-control" required>
    </div>
    <div class="col-8">
        <label class="form-label">事由</label>
        <input type="text" name="reason" class="form-control">
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-success">提交</button>
    </div>
</form>
{% endblock %}
