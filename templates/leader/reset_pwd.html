{% extends "base.html" %}
{% block content %}
<h2>重置员工密码</h2>
<form method="post" class="row g-3">
    <div class="col-md-4">
        <label class="form-label">选择员工</label>
        <select name="user_id" class="form-select">
            {% for w in workers %}
            <option value="{{ w.id }}">{{ w.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-warning">重置为默认密码</button>
    </div>
</form>
{% endblock %}
